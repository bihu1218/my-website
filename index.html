<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>生日天赋测试小程序预览</title>
    <style>
:root {
  --ink: #fff6dc;
  --muted: #cbbca1;
  --dim: #8f806b;
  --line: rgba(242, 199, 111, 0.22);
  --panel: rgba(18, 24, 48, 0.74);
  --deep: #0b1021;
  --deep-2: #160f1f;
  --gold: #f2c76f;
  --gold-2: #c98a38;
  --aqua: #7bd1bf;
  --violet: #b1589a;
}

* {
  box-sizing: border-box;
}

body {
  min-height: 100vh;
  margin: 0;
  color: var(--ink);
  background: linear-gradient(180deg, #101735 0%, var(--deep) 42%, var(--deep-2) 100%);
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
}

body::before,
body::after {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
}

body::before {
  background:
    radial-gradient(circle at 50% 10%, rgba(242, 199, 111, 0.18) 0 8%, transparent 30%),
    radial-gradient(circle at 12% 22%, rgba(123, 209, 191, 0.16) 0 12%, transparent 34%),
    radial-gradient(circle at 90% 8%, rgba(177, 88, 154, 0.16) 0 14%, transparent 36%);
}

body::after {
  background-image:
    radial-gradient(circle, rgba(255, 241, 201, 0.95) 0 1px, transparent 2px),
    radial-gradient(circle, rgba(123, 209, 191, 0.72) 0 1px, transparent 2px);
  background-position: 10px 18px, 48px 60px;
  background-size: 66px 66px, 94px 94px;
  opacity: 0.34;
}

button,
input {
  font: inherit;
}

button {
  cursor: pointer;
}

.app {
  position: relative;
  z-index: 1;
  width: min(100%, 900px);
  margin: 0 auto;
  padding: 34px 18px 64px;
}

.hero {
  padding: 10px 2px 0;
}

.eyebrow {
  display: inline-flex;
  align-items: center;
  min-height: 30px;
  margin: 0;
  padding: 0 12px;
  border: 1px solid rgba(242, 199, 111, 0.35);
  border-radius: 999px;
  color: var(--gold);
  background: rgba(11, 16, 33, 0.62);
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 1px;
}

h1 {
  max-width: 700px;
  margin: 24px 0 0;
  color: var(--ink);
  font-size: clamp(42px, 8vw, 72px);
  line-height: 1.05;
  letter-spacing: 0;
  text-shadow: 0 16px 48px rgba(242, 199, 111, 0.22);
}

.subcopy {
  max-width: 680px;
  margin: 18px 0 0;
  color: var(--muted);
  font-size: 17px;
  line-height: 1.75;
}

.hero-metrics {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-top: 22px;
}

.hero-metrics div {
  min-height: 74px;
  padding: 14px 12px;
  border: 1px solid rgba(242, 199, 111, 0.22);
  border-radius: 14px;
  background:
    linear-gradient(160deg, rgba(242, 199, 111, 0.12), rgba(177, 88, 154, 0.08)),
    rgba(255, 255, 255, 0.06);
  box-shadow: 0 0 32px rgba(242, 199, 111, 0.08);
  text-align: center;
}

.hero-metrics strong,
.hero-metrics span {
  display: block;
}

.hero-metrics strong {
  color: var(--gold);
  font-size: 24px;
  line-height: 1;
}

.hero-metrics span {
  margin-top: 9px;
  color: var(--muted);
  font-size: 13px;
  font-weight: 900;
}

.astro-stage {
  margin: 26px auto 0;
  padding: 6px 0 4px;
}

.zodiac-wheel {
  position: relative;
  width: min(440px, 72vw);
  height: min(440px, 72vw);
  margin: 0 auto;
  border-radius: 50%;
  background:
    radial-gradient(circle, rgba(255, 235, 176, 0.18) 0 6%, transparent 7%),
    conic-gradient(from 20deg, rgba(242, 199, 111, 0.24), rgba(123, 209, 191, 0.08), rgba(177, 88, 154, 0.16), rgba(242, 199, 111, 0.24));
  box-shadow:
    inset 0 0 42px rgba(242, 199, 111, 0.16),
    0 0 80px rgba(123, 209, 191, 0.14);
}

.ring {
  position: absolute;
  border-radius: 50%;
  border: 1px solid rgba(242, 199, 111, 0.32);
}

.ring.outer {
  inset: 0;
  border-width: 2px;
}

.ring.middle {
  inset: 14%;
  border-color: rgba(123, 209, 191, 0.34);
}

.ring.inner {
  inset: 30%;
  border-color: rgba(255, 246, 220, 0.24);
}

.axis {
  position: absolute;
  left: 50%;
  top: 6%;
  width: 1px;
  height: 88%;
  background: linear-gradient(180deg, transparent, rgba(242, 199, 111, 0.42), transparent);
  transform-origin: center;
}

.axis.two {
  transform: rotate(60deg);
}

.axis.three {
  transform: rotate(120deg);
}

.point {
  position: absolute;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #fff1c9;
  box-shadow: 0 0 18px rgba(255, 241, 201, 0.95);
}

.p1 {
  left: 22%;
  top: 21%;
}

.p2 {
  right: 18%;
  top: 31%;
}

.p3 {
  left: 30%;
  bottom: 20%;
}

.p4 {
  right: 31%;
  bottom: 27%;
}

.moon,
.sun {
  position: absolute;
  display: grid;
  place-items: center;
  left: 50%;
  top: 50%;
  width: 25%;
  height: 25%;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  color: var(--gold);
  background: rgba(11, 16, 33, 0.68);
  font-size: clamp(44px, 10vw, 68px);
  box-shadow: 0 0 40px rgba(242, 199, 111, 0.2);
}

.sun {
  width: 12%;
  height: 12%;
  transform: translate(100%, -270%);
  color: var(--aqua);
  background: transparent;
  font-size: 34px;
  box-shadow: none;
}

.stage-copy {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-top: 18px;
}

.stage-copy span {
  min-height: 42px;
  padding: 10px;
  border: 1px solid rgba(242, 199, 111, 0.2);
  border-radius: 12px;
  color: #ead6aa;
  background: rgba(255, 255, 255, 0.06);
  font-size: 13px;
  font-weight: 900;
  text-align: center;
}

.panel {
  border: 1px solid var(--line);
  border-radius: 16px;
  background:
    linear-gradient(160deg, rgba(242, 199, 111, 0.1), rgba(18, 24, 48, 0.78) 52%, rgba(177, 88, 154, 0.08)),
    var(--panel);
  box-shadow: 0 24px 60px rgba(0, 0, 0, 0.24);
}

.input-panel {
  margin-top: 28px;
  padding: 22px;
}

label {
  display: block;
  margin-bottom: 12px;
  color: #ead6aa;
  font-weight: 900;
}

.input-line {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 12px;
}

input {
  min-height: 58px;
  width: 100%;
  padding: 0 16px;
  border: 1px solid rgba(242, 199, 111, 0.24);
  border-radius: 14px;
  color: var(--ink);
  background: rgba(5, 8, 18, 0.42);
  font-size: 18px;
  font-weight: 900;
}

input::-webkit-calendar-picker-indicator {
  filter: invert(1) sepia(0.4) saturate(1.8);
}

#generate {
  min-height: 58px;
  padding: 0 24px;
  border: 0;
  border-radius: 14px;
  color: #22150a;
  background: linear-gradient(135deg, #ffe3a0, var(--gold) 48%, var(--gold-2));
  box-shadow: 0 24px 44px rgba(242, 199, 111, 0.22);
  font-weight: 900;
}

.safe-note {
  margin: 16px 0 0;
  color: #b8a88f;
  font-size: 13px;
  line-height: 1.7;
}

.report {
  margin-top: 40px;
}

.report-head {
  position: relative;
  padding: 4px 2px;
}

.report-sigil {
  position: absolute;
  right: 4px;
  top: 0;
  display: grid;
  place-items: center;
  width: 86px;
  height: 86px;
  color: var(--gold);
}

.report-sigil span,
.report-sigil::before {
  content: "";
  position: absolute;
  inset: 0;
  border: 1px solid rgba(242, 199, 111, 0.34);
  border-radius: 50%;
  box-shadow: 0 0 34px rgba(242, 199, 111, 0.12);
}

.report-sigil::before {
  inset: 14px;
  border-color: rgba(123, 209, 191, 0.32);
}

.report-sigil strong {
  position: relative;
  font-size: 34px;
}

h2 {
  max-width: calc(100% - 100px);
  margin: 24px 0 0;
  color: var(--ink);
  font-size: clamp(34px, 6vw, 56px);
  line-height: 1.12;
  letter-spacing: 0;
  text-shadow: 0 14px 44px rgba(242, 199, 111, 0.18);
}

.archetype {
  margin: 12px 0 0;
  color: var(--gold);
  font-size: 18px;
  font-weight: 900;
}

.overview {
  max-width: 760px;
  margin: 14px 0 0;
  color: var(--muted);
  font-size: 16px;
  line-height: 1.75;
}

.button-row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 18px;
}

.secondary {
  min-height: 44px;
  padding: 0 18px;
  border: 1px solid rgba(242, 199, 111, 0.3);
  border-radius: 12px;
  color: var(--ink);
  background: rgba(255, 255, 255, 0.08);
  font-weight: 900;
}

.fit-dashboard {
  display: grid;
  grid-template-columns: 150px 1fr;
  gap: 18px;
  align-items: center;
  margin-top: 26px;
  padding: 22px;
  border-color: rgba(242, 199, 111, 0.3);
  background:
    radial-gradient(circle at 12% 20%, rgba(242, 199, 111, 0.18), transparent 36%),
    linear-gradient(135deg, rgba(242, 199, 111, 0.12), rgba(177, 88, 154, 0.12)),
    rgba(18, 24, 48, 0.78);
}

.fit-main {
  display: grid;
  place-items: center;
  min-height: 138px;
  border: 2px solid rgba(242, 199, 111, 0.34);
  border-radius: 50%;
  box-shadow:
    inset 0 0 36px rgba(242, 199, 111, 0.12),
    0 0 40px rgba(242, 199, 111, 0.12);
}

.fit-main strong {
  color: var(--gold);
  font-size: 56px;
  line-height: 0.9;
}

.fit-main span {
  color: #ead6aa;
  font-size: 13px;
  font-weight: 900;
}

.fit-dashboard p {
  margin: 0;
  color: #d7c6a8;
  font-size: 15px;
  line-height: 1.7;
}

.model-notice {
  margin-top: 14px;
  padding: 14px 16px;
  color: #ead6aa;
  font-size: 13px;
  font-weight: 800;
  line-height: 1.55;
}

.feature-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin-top: 16px;
}

.feature-chip {
  min-height: 52px;
  padding: 13px;
  border: 1px solid rgba(242, 199, 111, 0.22);
  border-radius: 14px;
  color: var(--ink);
  background:
    linear-gradient(135deg, rgba(242, 199, 111, 0.12), rgba(177, 88, 154, 0.08)),
    rgba(255, 255, 255, 0.06);
  font-size: 14px;
  font-weight: 900;
  line-height: 1.4;
}

.signal-list {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
}

.signal-card {
  padding: 18px;
  border-color: rgba(242, 199, 111, 0.2);
}

.signal-title {
  color: var(--gold);
  font-size: 13px;
  font-weight: 900;
}

.signal-value {
  margin-top: 8px;
  color: var(--ink);
  font-size: 18px;
  font-weight: 900;
}

.signal-card p {
  margin: 9px 0 0;
  color: var(--muted);
  font-size: 14px;
  line-height: 1.58;
}

h3 {
  margin: 36px 0 14px;
  color: var(--ink);
  font-size: 22px;
  letter-spacing: 0;
}

h3::before {
  content: "";
  display: inline-block;
  width: 7px;
  height: 7px;
  margin-right: 9px;
  border-radius: 50%;
  background: var(--gold);
  box-shadow: 0 0 14px rgba(242, 199, 111, 0.74);
  vertical-align: 3px;
}

.score-list {
  padding: 20px;
}

.score-row + .score-row {
  margin-top: 16px;
}

.score-head {
  display: flex;
  justify-content: space-between;
  margin-bottom: 9px;
  color: #ead6aa;
  font-size: 15px;
  font-weight: 900;
}

.score-track {
  height: 10px;
  overflow: hidden;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.1);
}

.score-fill {
  height: 100%;
  border-radius: 999px;
  background: linear-gradient(90deg, var(--violet), var(--gold) 55%, var(--aqua));
  box-shadow: 0 0 18px rgba(242, 199, 111, 0.28);
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
}

.talent-card,
.career-card,
.text-panel {
  padding: 20px;
}

.talent-top,
.career-rank {
  color: var(--gold);
  font-size: 13px;
  font-weight: 900;
}

.career-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.career-fit {
  padding: 6px 10px;
  border: 1px solid rgba(242, 199, 111, 0.3);
  border-radius: 999px;
  color: var(--gold);
  background: rgba(242, 199, 111, 0.1);
  font-size: 13px;
  font-weight: 900;
}

.talent-top {
  display: flex;
  justify-content: space-between;
}

.talent-card h4,
.career-card h4 {
  margin: 10px 0 0;
  color: var(--ink);
  font-size: 19px;
  line-height: 1.25;
}

.talent-card p,
.career-card p,
.text-panel {
  color: var(--muted);
  font-size: 15px;
  line-height: 1.68;
}

.career-list {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
}

.role-list,
.keyword-list,
.track-list {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 14px;
}

.role-list span,
.keyword-list span {
  padding: 7px 10px;
  border-radius: 999px;
  color: #241807;
  background: rgba(242, 199, 111, 0.84);
  font-size: 13px;
  font-weight: 900;
}

.track-list span {
  padding: 7px 10px;
  border: 1px solid rgba(177, 88, 154, 0.28);
  border-radius: 999px;
  color: var(--ink);
  background: rgba(177, 88, 154, 0.22);
  font-size: 13px;
  font-weight: 900;
}

.next {
  color: #ead6aa;
  font-weight: 800;
}

.proof {
  color: #ead6aa;
  font-weight: 800;
}

.plan-list {
  padding: 6px 20px;
}

.plan-item {
  padding: 18px 0;
}

.plan-item + .plan-item {
  border-top: 1px solid rgba(242, 199, 111, 0.16);
}

.plan-period {
  color: var(--gold);
  font-size: 13px;
  font-weight: 900;
}

.plan-title {
  margin: 7px 0 0;
  color: var(--ink);
  font-size: 17px;
  font-weight: 900;
}

.plan-detail {
  margin: 7px 0 0;
  color: var(--muted);
  font-size: 15px;
  line-height: 1.65;
}

.keyword-list {
  padding: 18px;
}

.premium-panel {
  padding: 20px;
  border-color: rgba(242, 199, 111, 0.32);
}

.premium-head {
  display: flex;
  justify-content: space-between;
  color: var(--gold);
  font-size: 18px;
  font-weight: 900;
}

.premium-list {
  display: grid;
  gap: 10px;
  margin-top: 16px;
}

.premium-list span {
  padding: 14px;
  border-radius: 12px;
  color: var(--ink);
  background: rgba(255, 255, 255, 0.07);
  font-size: 14px;
  line-height: 1.58;
}

.prompt-list {
  display: grid;
  gap: 10px;
}

.prompt-item {
  padding: 16px 18px;
  border-left: 4px solid var(--gold);
  border-radius: 12px;
  color: var(--ink);
  background: rgba(255, 255, 255, 0.08);
  font-weight: 800;
  line-height: 1.55;
}

@media (max-width: 720px) {
  .app {
    padding-inline: 16px;
  }

  .input-line,
  .grid,
  .career-list,
  .stage-copy,
  .hero-metrics,
  .feature-grid,
  .signal-list,
  .fit-dashboard {
    grid-template-columns: 1fr;
  }

  #generate {
    width: 100%;
  }

  .report-sigil {
    position: relative;
    right: auto;
    top: auto;
    margin-top: 18px;
  }

  h2 {
    max-width: none;
  }
}

</style>
  </head>
  <body>
    <div class="sky" aria-hidden="true"></div>
    <main class="app">
      <section class="hero">
        <p class="eyebrow">BIRTH CHART READING</p>
        <h1>解读你的本命天赋与事业方向</h1>
        <p class="subcopy">输入出生日期，生成一份适合大众阅读的个人报告：天赋底色、事业倾向、潜力行业、成长路径与可继续追问的问题。</p>
      </section>

      <section class="hero-metrics" aria-label="产品特点">
        <div>
          <strong>本命</strong>
          <span>天赋画像</span>
        </div>
        <div>
          <strong>事业</strong>
          <span>方向适配</span>
        </div>
        <div>
          <strong>追问</strong>
          <span>继续解读</span>
        </div>
      </section>

      <section class="astro-stage" aria-hidden="true">
        <div class="zodiac-wheel">
          <span class="ring outer"></span>
          <span class="ring middle"></span>
          <span class="ring inner"></span>
          <span class="axis one"></span>
          <span class="axis two"></span>
          <span class="axis three"></span>
          <span class="point p1"></span>
          <span class="point p2"></span>
          <span class="point p3"></span>
          <span class="point p4"></span>
          <span class="moon">☾</span>
          <span class="sun">✦</span>
        </div>
        <div class="stage-copy">
          <span>本命天赋</span>
          <span>事业适配</span>
          <span>深度报告</span>
        </div>
      </section>

      <section class="input-panel panel">
        <label for="birthday">出生日期</label>
        <div class="input-line">
          <input id="birthday" type="date" min="1900-01-01">
          <button id="generate" type="button">生成我的天赋报告</button>
        </div>
        <p class="safe-note">本测试用于自我探索和娱乐参考，不会决定你的命运或职业上限。</p>
      </section>

      <section id="report" class="report" hidden>
        <div class="report-head">
          <p id="reportDate" class="eyebrow"></p>
          <div class="report-sigil" aria-hidden="true">
            <span></span>
            <strong id="lifeNumber"></strong>
          </div>
          <h2 id="reportTitle"></h2>
          <p id="reportArchetype" class="archetype"></p>
          <p id="reportOverview" class="overview"></p>
          <div class="button-row">
            <button id="copy" type="button" class="secondary">复制摘要</button>
            <button id="reset" type="button" class="secondary">重新测试</button>
          </div>
        </div>

        <div class="fit-dashboard panel">
          <div class="fit-main">
            <strong id="fitScore"></strong>
            <span>契合提示</span>
          </div>
          <p id="positioning"></p>
        </div>

        <div id="modelNotice" class="model-notice panel" hidden></div>

        <div id="features" class="feature-grid"></div>

        <h3>解读依据</h3>
        <div id="signals" class="signal-list"></div>

        <h3>星象天赋雷达</h3>
        <div id="scores" class="score-list panel"></div>

        <h3>三项主天赋</h3>
        <div id="talents" class="grid"></div>

        <h3>未来发展方向</h3>
        <div id="careers" class="career-list"></div>

        <h3>可以留意的方向</h3>
        <div id="marketTracks" class="keyword-list panel"></div>

        <h3 id="yearTitle"></h3>
        <div id="yearAdvice" class="text-panel panel"></div>

        <h3>成长行动路径</h3>
        <div id="plan" class="plan-list panel"></div>

        <h3>表达关键词</h3>
        <div id="keywords" class="keyword-list panel"></div>

        <h3 id="premiumTitle"></h3>
        <div class="premium-panel panel">
          <div class="premium-head">
            <span>继续看下去</span>
            <strong id="premiumPrice"></strong>
          </div>
          <div id="premiumPoints" class="premium-list"></div>
        </div>

        <h3>需要避开的盲点</h3>
        <div id="blindSpot" class="text-panel panel"></div>

        <h3>可以继续追问</h3>
        <div id="prompts" class="prompt-list"></div>

        <p id="disclaimer" class="safe-note"></p>
      </section>
    </main>

    <script>
(function (root, factory) {
  var api = factory();
  if (typeof module !== "undefined" && module.exports) {
    module.exports = api;
  }
  if (typeof window !== "undefined") {
    window.BirthdayTalent = api;
  }
})(this, function () {
  var ZODIACS = [
    {
      name: "白羊座",
      start: 321,
      end: 419,
      element: "火象",

  var SCORE_META = {

  var ELEMENT_SCORE = {

  function parseBirthday(value) {
    if (!value || typeof value !== "string") {
      return { ok: false, message: "请选择出生日期" };
    }

    var match = /^(\d{4})-(\d{2})-(\d{2})$/.exec(value);
    if (!match) {
      return { ok: false, message: "生日格式需要是 YYYY-MM-DD" };
    }

    var year = Number(match[1]);
    var month = Number(match[2]);
    var day = Number(match[3]);
    var date = new Date(year, month - 1, day);

    if (
      date.getFullYear() !== year ||
      date.getMonth() !== month - 1 ||
      date.getDate() !== day
    ) {
      return { ok: false, message: "请输入真实存在的日期" };
    }

    var today = new Date();
    today.setHours(23, 59, 59, 999);
    if (date > today) {
      return { ok: false, message: "生日不能晚于今天" };
    }

    if (year < 1900) {
      return { ok: false, message: "目前支持 1900 年之后的生日" };
    }

    return { ok: true, year: year, month: month, day: day, date: date };
  }

  function formatDate(date) {
    var year = date.getFullYear();
    var month = pad2(date.getMonth() + 1);
    var day = pad2(date.getDate());
    return year + "-" + month + "-" + day;
  }

  function pad2(value) {
    return value < 10 ? "0" + value : String(value);
  }

  function getZodiac(month, day) {
    var md = month * 100 + day;
    for (var i = 0; i < ZODIACS.length; i += 1) {
      var sign = ZODIACS[i];
      var inRange = sign.start <= sign.end
        ? md >= sign.start && md <= sign.end
        : md >= sign.start || md <= sign.end;
      if (inRange) {
        return sign;
      }
    }
    return ZODIACS[0];
  }

  function sumDigits(input) {
    return String(input).replace(/\D/g, "").split("").reduce(function (sum, item) {
      return sum + Number(item);
    }, 0);
  }

  function reduceNumber(num, keepMaster) {
    var value = num;
    while (value > 9) {
      if (keepMaster && (value === 11 || value === 22)) {
        return value;
      }
      value = sumDigits(value);
    }
    return value;
  }

  function getSeason(month) {
    var keys = Object.keys(SEASONS);
    for (var i = 0; i < keys.length; i += 1) {
      var season = SEASONS[keys[i]];
      if (season.months.indexOf(month) !== -1) {
        return season;
      }
    }
    return SEASONS.spring;
  }

  function seededNoise(seed, key) {
    var text = seed + ":" + key;
    var hash = 0;
    for (var i = 0; i < text.length; i += 1) {
      hash = (hash * 31 + text.charCodeAt(i)) % 9973;
    }
    return (hash % 11) - 5;
  }

  function clamp(num, min, max) {
    return Math.max(min, Math.min(max, num));
  }

  function buildScoreTone(score) {
    if (score >= 90) {
      return "很突出";
    }
    if (score >= 82) {
      return "比较明显";
    }
    if (score >= 74) {
      return "正在形成";
    }
    return "可以训练";
  }

  function buildScores(sign, lifeNumber, seed) {
    var base = ELEMENT_SCORE[sign.element];
    var boost = LIFE_SCORE_BOOST[lifeNumber] || {};
    return Object.keys(SCORE_META).map(function (key) {
      var value = clamp((base[key] || 70) + (boost[key] || 0) + seededNoise(seed, key), 58, 96);
      return {
        key: key,
        label: SCORE_META[key].label,
        value: value,
        grade: buildScoreTone(value),
        text: SCORE_META[key].high
      };
    }).sort(function (a, b) {
      return b.value - a.value;
    });
  }

  function rankCareers(sign, life, season, seed) {
    var weights = {};

    function add(keys, score) {
      keys.forEach(function (key, index) {
        weights[key] = (weights[key] || 0) + score - index;
      });
    }

    add(sign.clusters, 7);
    add(life.clusters, 8);
    add(season.clusters, 4);

    return Object.keys(CAREERS).map(function (key) {
      return {
        key: key,
        score: (weights[key] || 0) + seededNoise(seed, "career-" + key) / 10,
        detail: CAREERS[key]
      };
    }).sort(function (a, b) {
      return b.score - a.score;
    }).slice(0, 4).map(function (item, index) {
      var fitScore = clamp(Math.round(78 + item.score * 1.7 + seededNoise(seed, "fit-" + item.key)), 72, 98);
      return {
        rank: index + 1,
        key: item.key,
        fitScore: fitScore,
        fitText: index === 0 ? "很值得优先看看" : index === 1 ? "可以认真了解" : "适合作为备选",
        title: item.detail.title,
        roles: item.detail.roles,
        hotTracks: item.detail.hotTracks,
        why: item.detail.why,
        next: item.detail.next,
        proof: item.detail.proof,
        keywords: item.detail.keywords
      };
    });
  }

  function buildModelSignals(sign, life, season, weekday, scores) {
    return [
      {
        title: "星象底色",
        value: sign.name + " · " + sign.element,
        detail: "这部分更像你的第一反应：你面对事情时，通常会从哪里开始用力。"
      },
      {
        title: "生命数字",
        value: String(life.number || ""),
        detail: life.title + "： " + life.action
      },
      {
        title: "成长节律",
        value: season.name,
        detail: "它更像你的节奏提醒。你不必一直保持同一种状态，找到适合自己的发力方式更重要。"

        title: "显眼优势",
        value: scores[0].label,
        detail: "这项能力不是用来给你贴标签，而是提醒你：有些事情你可能本来就做得比想象中顺。"
      }
    ];
  }

  function buildMarketTracks(careers) {
    return unique(careers.reduce(function (all, item) {
      return all.concat(item.hotTracks || []);
    }, [])).slice(0, 10);
  }

  function buildPersonalYear(month, day, currentYear) {
    var number = reduceNumber(sumDigits(String(currentYear) + pad2(month) + pad2(day)), false);
    return {
      number: number,
      title: PERSONAL_YEAR[number].title,
      advice: PERSONAL_YEAR[number].advice
    };
  }

  function buildFitGrade(score) {
    if (score >= 92) {
      return "很高";
    }
    if (score >= 86) {
      return "偏高";
    }
    return "可尝试";
  }

  function buildProfile(birthday, options) {
    var parsed = parseBirthday(birthday);
    if (!parsed.ok) {
      return {
        isValid: false,
        error: parsed.message
      };
    }

    var currentYear = options && options.currentYear ? options.currentYear : new Date().getFullYear();
    var sign = getZodiac(parsed.month, parsed.day);
    var lifeNumber = reduceNumber(sumDigits(parsed.year + pad2(parsed.month) + pad2(parsed.day)), true);
    var life = LIFE_PATHS[lifeNumber] || LIFE_PATHS[reduceNumber(lifeNumber, false)];
    life.number = lifeNumber;
    var season = getSeason(parsed.month);
    var weekday = WEEKDAY_TYPES[parsed.date.getDay()];
    var seed = parsed.year + "-" + parsed.month + "-" + parsed.day;
    var scores = buildScores(sign, lifeNumber, seed);
    var careers = rankCareers(sign, life, season, seed);
    var marketTracks = buildMarketTracks(careers);
    var personalYear = buildPersonalYear(parsed.month, parsed.day, currentYear);
    var topTalents = scores.slice(0, 3).map(function (item, index) {
      return {
        title: item.label,
        value: item.grade,
        text: item.text,
        tag: ["主天赋", "优势位", "可训练"][index]
      };
    });
    var resumeKeywords = unique(careers.reduce(function (all, item) {
      return all.concat(item.keywords);
    }, [])).slice(0, 8);
    var modelSignals = buildModelSignals(sign, life, season, weekday, scores);
    var careerFitScore = clamp(Math.round((scores[0].value + scores[1].value + careers[0].fitScore) / 3), 76, 98);
    var fitGrade = buildFitGrade(careerFitScore);

    return {
      isValid: true,
      birthday: formatDate(parsed.date),
      title: sign.name + " · " + life.title,
      archetype: sign.element + sign.archetype,
      headline: sign.headline,

      careerFitScore: careerFitScore,
      fitGrade: fitGrade,
      fitTone: "你和这些方向的契合感" + fitGrade + "。这不是给人生下结论，而是帮你从几个更顺手的入口开始观察自己。",
      reportFeatures: REPORT_FEATURES,
      modelSignals: modelSignals,
      sign: sign,
      lifeNumber: lifeNumber,
      life: life,
      season: season,
      weekday: weekday,
      scores: scores,
      talents: topTalents,
      careers: careers,
      marketTracks: marketTracks,
      personalYear: personalYear,
      resumeKeywords: resumeKeywords,
      blindSpot: sign.risk,
      developmentPlan: [
        {
          period: "第 1-2 周",
          title: "先观察自己被什么吸引",
          detail: "从前两个推荐方向里各找几个真实方向或案例，不用急着投递，先看看哪些内容会让你自然产生兴趣。"
        },
        {
          period: "第 3-6 周",
          title: "做一个小作品",
          detail: "围绕“" + careers[0].title + "”做一个很小的练习，比如一页分析、一份策划、一次访谈或一组内容。重点不是完美，而是开始有痕迹。"
        },
        {
          period: "第 7-10 周",
          title: "把经历讲清楚",
          detail: "把你做过的事改成更容易被理解的表达：当时遇到什么问题，你做了什么，最后有什么变化。"

  function unique(list) {
    var seen = {};
    return list.filter(function (item) {
      if (seen[item]) {
        return false;
      }
      seen[item] = true;
      return true;
    });
  }

  return {
    buildProfile: buildProfile,
    parseBirthday: parseBirthday,
    formatDate: formatDate
  };
});

        return "<span>" + role + "</span>";

      node.appendChild(card);

  function renderPlan(plan) {

      var block = document.createElement("div");

        '<p class="plan-detail">' + item.detail + '</p>';

  function renderPrompts(prompts) {

    prompts.forEach(function (item) {

      prompt.className = "prompt-item";
      prompt.textContent = item;
      node.appendChild(prompt);

    text("premiumPrice", data.price);
    var node = document.getElementById("premiumPoints");
    clear(node);
    data.points.forEach(function (item) {
      var point = document.createElement("span");
      point.textContent = item;
      node.appendChild(point);
    });
  }

  function setModelNotice(message) {
    var node = document.getElementById("modelNotice");
    if (!node) {
      return;
    }
    if (!message) {
      node.hidden = true;
      node.textContent = "";
      return;
    }
    node.hidden = false;
    node.textContent = message;
  }

  function mergePatch(data, patch) {
    if (!patch || typeof patch !== "object") {
      return data;
    }

    if (patch.overview) {
      data.overview = patch.overview;
    }
    if (patch.fitTone) {
      data.fitTone = patch.fitTone;
    }
    if (Array.isArray(patch.careers)) {
      patch.careers.forEach(function (item, index) {
        if (!data.careers[index] || !item) {
          return;
        }
        ["why", "next", "proof"].forEach(function (key) {
          if (item[key]) {
            data.careers[index][key] = item[key];
          }
        });
      });
    }
    if (Array.isArray(patch.developmentPlan)) {
      patch.developmentPlan.forEach(function (item, index) {
        if (data.developmentPlan[index] && item && item.detail) {
          data.developmentPlan[index].detail = item.detail;
        }
      });
    }
    if (Array.isArray(patch.prompts) && patch.prompts.length) {
      data.prompts = patch.prompts.slice(0, 3);
    }

    return data;
  }

  function renderProfile(data) {
    if (!data.isValid) {
      alert(data.error);
      return;
    }

    currentProfile = data;
    text("reportDate", data.birthday);
    text("lifeNumber", data.lifeNumber);
    text("reportTitle", data.title);
    text("reportArchetype", data.archetype);
    text("reportOverview", data.overview);
    text("fitScore", data.fitGrade);
    text("positioning", data.fitTone);
    text("yearTitle", data.personalYear.number + " 号年度节奏 · " + data.personalYear.title);
    text("yearAdvice", data.personalYear.advice);
    text("blindSpot", data.blindSpot);
    text("disclaimer", data.disclaimer);
    renderScores(data.scores);
    renderFeatures(data.reportFeatures);
    renderSignals(data.modelSignals);
    renderTalents(data.talents);
    renderCareers(data.careers);
    renderPlan(data.developmentPlan);
    renderList("marketTracks", data.marketTracks);
    renderList("keywords", data.resumeKeywords);
    renderPrompts(data.prompts);
    renderPremium(data.premiumPreview);
    report.hidden = false;
    report.scrollIntoView({ behavior: "smooth", block: "start" });
    return data;
  }

  function enhanceWithModel(data) {
    if (!window.fetch || window.location.protocol === "file:") {
      setModelNotice("当前是单文件预览，使用本地解读。需要模型润色时，请用桌面的“一键打开”入口启动本地服务。");
      return;
    }
    if (!/^(127\.0\.0\.1|localhost)$/.test(window.location.hostname)) {
      setModelNotice("当前是公开预览版，使用本地解读。完整模型润色需要接入后端服务。");
      return;
    }

    setModelNotice("正在尝试调用已配置的语言模型润色报告；如果没有配置密钥，会自动保留本地解读。");
    fetch("/api/enhance-report", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ profile: data })
    }).then(function (response) {
      return response.json().then(function (payload) {
        return { ok: response.ok, status: response.status, payload: payload };
      });
    }).then(function (result) {
      if (result.status === 202) {
        setModelNotice("当前未配置外部润色服务，已使用本地解读版本。配置后会自动匹配可用模型并润色报告。");
        return;
      }
      if (!result.ok || !result.payload || !result.payload.patch) {
        setModelNotice("模型润色暂时不可用，已保留本地解读版本。");
        return;
      }
      currentProfile = mergePatch(currentProfile, result.payload.patch);
      renderProfile(currentProfile);
      setModelNotice("已使用模型润色本次报告，模型：" + (result.payload.model || "auto"));
    }).catch(function () {
      setModelNotice("模型润色暂时不可用，已保留本地解读版本。");
    });
  }

  function render() {
    var data = window.BirthdayTalent.buildProfile(input.value);
    if (!data.isValid) {
      alert(data.error);
      return;
    }

    currentProfile = data;
    renderProfile(data);
    enhanceWithModel(data);
  }

  generate.addEventListener("click", render);
  input.addEventListener("keydown", function (event) {
    if (event.key === "Enter") {
      render();
    }
  });

  reset.addEventListener("click", function () {
    input.value = "";
    report.hidden = true;
    currentProfile = null;
    input.focus();
  });

  copy.addEventListener("click", function () {
    if (!currentProfile) {
      return;
    }
    var summary = [
      "我的本命天赋报告",
      currentProfile.birthday + " / " + currentProfile.title,
      currentProfile.shareText,
      "可以留意：" + currentProfile.careers.map(function (item) { return item.title; }).join("、"),
      "表达关键词：" + currentProfile.resumeKeywords.join("、")
    ].join("\n");

    navigator.clipboard.writeText(summary).then(function () {
      copy.textContent = "已复制";
      setTimeout(function () {
        copy.textContent = "复制摘要";
      }, 1200);
    });
  });
})();

</script>
  </body>
</html>
